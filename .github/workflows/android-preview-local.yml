name: Paddle Today Android Preview Build

on:
  workflow_dispatch:

concurrency:
  group: android-preview-local
  cancel-in-progress: false

jobs:
  build_android_preview:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      GOOGLE_MAPS_ANDROID_API_KEY: ${{ secrets.GOOGLE_MAPS_ANDROID_API_KEY }}
      EXPO_PUBLIC_API_BASE_URL: https://paddletoday.com
      EXPO_PUBLIC_APP_ENV: preview
      EAS_LOCAL_BUILD_ARTIFACTS_DIR: ${{ github.workspace }}/apps/mobile/artifacts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release readiness
        run: npm run mobile:release-check

      - name: Typecheck mobile app
        run: npm run mobile:typecheck

      - name: Build Android preview APK
        working-directory: apps/mobile
        run: eas build --platform android --profile preview --local --non-interactive

      - name: Upload Android preview APK
        uses: actions/upload-artifact@v4
        with:
          name: paddletoday-android-preview
          path: apps/mobile/artifacts/*
          if-no-files-found: error
