name: Paddle Today River Snapshots

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: river-snapshots
  cancel-in-progress: false

jobs:
  refresh_snapshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build river snapshots
        env:
          RIVER_SNAPSHOT_CONTAINER_SAS_URL: ${{ secrets.RIVER_SNAPSHOT_CONTAINER_SAS_URL }}
          RIVER_SNAPSHOT_BLOB_PREFIX: ${{ vars.RIVER_SNAPSHOT_BLOB_PREFIX || 'river-snapshots' }}
        run: |
          if [ -z "$RIVER_SNAPSHOT_CONTAINER_SAS_URL" ]; then
            echo "RIVER_SNAPSHOT_CONTAINER_SAS_URL is not configured."
            exit 1
          fi

          npm run snapshots:refresh
