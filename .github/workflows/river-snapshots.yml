name: Paddle Today River Snapshots

on:
  workflow_run:
    workflows:
      - Paddle Today API
    types:
      - completed
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: river-snapshots
  cancel-in-progress: false

jobs:
  refresh_snapshots:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Refresh production river snapshots
        id: refresh
        env:
          API_ORIGIN: ${{ vars.API_ORIGIN || 'https://paddletodayapi-h7efgxcfg9h7gne9.centralus-01.azurewebsites.net' }}
          SNAPSHOT_REFRESH_TOKEN: ${{ secrets.SNAPSHOT_REFRESH_TOKEN }}
        run: |
          node --input-type=module <<'NODE'
          import { appendFileSync } from 'node:fs';
          const apiOrigin = process.env.API_ORIGIN.replace(/\/$/, '');
          const refreshUrl = `${apiOrigin}/api/snapshots/refresh?async=1`;
          const headers = {
            accept: 'application/json',
            'user-agent': 'PaddleToday-GitHubActions/1.0 (+https://github.com/EckceptionalSolutions/PaddleTodayV2)',
          };
          if (process.env.SNAPSHOT_REFRESH_TOKEN) {
            headers.authorization = `Bearer ${process.env.SNAPSHOT_REFRESH_TOKEN}`;
          }

          const maxReadyAttempts = 18;
          let ready = false;
          let lastReadyError;
          for (let attempt = 1; attempt <= maxReadyAttempts; attempt += 1) {
            try {
              const response = await fetch(`${apiOrigin}/health/ready?check=${Date.now()}`, {
                headers,
                signal: AbortSignal.timeout(30_000),
              });
              if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${(await response.text()).slice(0, 240)}`);
              }
              ready = true;
              break;
            } catch (error) {
              lastReadyError = error;
              if (attempt === maxReadyAttempts) break;
              const message = error instanceof Error ? error.message : String(error);
              console.warn(`API readiness attempt ${attempt}/${maxReadyAttempts} failed: ${message}. Retrying...`);
              await new Promise((resolve) => setTimeout(resolve, 10_000));
            }
          }
          if (!ready) {
            throw lastReadyError ?? new Error('Production API did not become ready.');
          }

          const response = await fetch(refreshUrl, {
            method: 'POST',
            headers,
            signal: AbortSignal.timeout(180_000),
          });
          const body = await response.text();
          if (!response.ok) {
            throw new Error(`Production snapshot refresh returned HTTP ${response.status}: ${body.slice(0, 400)}`);
          }

          const payload = JSON.parse(body);
          if (response.status !== 202 || payload.ok !== true || !payload.startedAt) {
            throw new Error('Production snapshot refresh did not start asynchronously. Check App Service snapshot settings.');
          }
          if (process.env.GITHUB_OUTPUT) {
            appendFileSync(process.env.GITHUB_OUTPUT, `started_at=${payload.startedAt}\n`);
          }
          console.log(`Production snapshot refresh started at ${payload.startedAt}; waiting for the completed Blob snapshot.`);
          NODE

      - name: Verify production snapshot freshness
        env:
          # Verify the API origin directly. The public hostname is protected by
          # Cloudflare and can reject GitHub-hosted runner traffic with HTTP 403
          # even when the App Service and Blob snapshot are healthy.
          API_ORIGIN: ${{ vars.API_ORIGIN || 'https://paddletodayapi-h7efgxcfg9h7gne9.centralus-01.azurewebsites.net' }}
          REFRESH_STARTED_AT: ${{ steps.refresh.outputs.started_at }}
        run: |
          node --input-type=module <<'NODE'
          const apiOrigin = process.env.API_ORIGIN.replace(/\/$/, '');
          const refreshStartedAt = Date.parse(process.env.REFRESH_STARTED_AT || '');
          if (!Number.isFinite(refreshStartedAt)) {
            throw new Error('Production snapshot refresh did not provide a valid start timestamp.');
          }
          const headers = {
            accept: 'application/json',
            'user-agent': 'PaddleToday-GitHubActions/1.0 (+https://github.com/EckceptionalSolutions/PaddleTodayV2)',
          };
          const maxAttempts = 20;
          let lastError;

          for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
            try {
              const url = `${apiOrigin}/api/rivers/rice-creek-peltier-to-long-lake.json?snapshot_check=${Date.now()}`;
              const response = await fetch(url, {
                headers,
                signal: AbortSignal.timeout(30_000),
              });
              if (!response.ok) {
                const body = await response.text();
                throw new Error(`HTTP ${response.status}: ${body.slice(0, 240)}`);
              }

              const payload = await response.json();
              const generatedAtValue = payload.generatedAt || payload.result?.generatedAt || '';
              const generatedAt = Date.parse(generatedAtValue);
              const ageMinutes = Number.isFinite(generatedAt)
                ? Math.round((Date.now() - generatedAt) / 60000)
                : Infinity;
              console.log(`Production snapshot generatedAt=${generatedAtValue || 'unknown'} ageMinutes=${ageMinutes}`);
              if (!Number.isFinite(generatedAt) || generatedAt + 5_000 < refreshStartedAt || ageMinutes > 20) {
                throw new Error('Production has not served the newly started snapshot yet. Check the API refresh response and App Service Blob Storage settings.');
              }

              process.exit(0);
            } catch (error) {
              lastError = error;
              if (attempt === maxAttempts) {
                break;
              }

              const message = error instanceof Error ? error.message : String(error);
              console.warn(`Snapshot probe attempt ${attempt}/${maxAttempts} failed: ${message}. Retrying...`);
              await new Promise((resolve) => setTimeout(resolve, Math.min(attempt * 5_000, 30_000)));
            }
          }

          throw new Error(`Production snapshot verification failed after ${maxAttempts} attempts: ${lastError instanceof Error ? lastError.message : String(lastError)}`);
          NODE
