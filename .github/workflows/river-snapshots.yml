name: Paddle Today River Snapshots

on:
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/river-snapshots.yml'
      - 'package-lock.json'
      - 'package.json'
      - 'packages/**'
      - 'src/data/**'
      - 'src/lib/**'
      - 'src/server/**'
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: river-snapshots
  cancel-in-progress: false

jobs:
  refresh_snapshots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build river snapshots
        env:
          RIVER_SNAPSHOT_CONTAINER_SAS_URL: ${{ secrets.RIVER_SNAPSHOT_CONTAINER_SAS_URL }}
          RIVER_SNAPSHOT_BLOB_PREFIX: ${{ vars.RIVER_SNAPSHOT_BLOB_PREFIX || 'river-snapshots' }}
        run: |
          if [ -z "$RIVER_SNAPSHOT_CONTAINER_SAS_URL" ]; then
            echo "RIVER_SNAPSHOT_CONTAINER_SAS_URL is not configured."
            exit 1
          fi

          npm run snapshots:refresh

      - name: Verify production snapshot freshness
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://paddletoday.com' }}
        run: |
          node --input-type=module <<'NODE'
          const siteUrl = process.env.SITE_URL.replace(/\/$/, '');
          const url = `${siteUrl}/api/rivers/rice-creek-peltier-to-long-lake.json?snapshot_check=${Date.now()}`;
          const response = await fetch(url, {
            headers: {
              accept: 'application/json',
              'user-agent': 'PaddleToday-GitHubActions/1.0 (+https://github.com/EckceptionalSolutions/PaddleTodayV2)',
            },
          });
          if (!response.ok) {
            throw new Error(`Production snapshot probe returned HTTP ${response.status}.`);
          }

          const payload = await response.json();
          const generatedAt = Date.parse(payload.generatedAt || payload.result?.generatedAt || '');
          const ageMinutes = Number.isFinite(generatedAt)
            ? Math.round((Date.now() - generatedAt) / 60000)
            : Infinity;
          console.log(`Production snapshot generatedAt=${payload.generatedAt || payload.result?.generatedAt || 'unknown'} ageMinutes=${ageMinutes}`);
          if (!Number.isFinite(generatedAt) || ageMinutes > 20) {
            throw new Error('Production is not serving the snapshot just written by this run. Check the workflow SAS URL, blob prefix, and App Service settings.');
          }
          NODE
