name: Paddle Today River Snapshots

on:
  workflow_run:
    workflows:
      - Paddle Today API
    types:
      - completed
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: river-snapshots
  cancel-in-progress: false

jobs:
  refresh_snapshots:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and store river snapshots
        id: capture
        env:
          RIVER_SNAPSHOT_CONTAINER_SAS_URL: ${{ secrets.RIVER_SNAPSHOT_CONTAINER_SAS_URL }}
          RIVER_SNAPSHOT_BLOB_PREFIX: river-snapshots
          RIVER_SCORE_CONCURRENCY: '24'
          RIVER_SNAPSHOT_WRITE_CONCURRENCY: '24'
        run: |
          if [ -z "$RIVER_SNAPSHOT_CONTAINER_SAS_URL" ]; then
            echo "RIVER_SNAPSHOT_CONTAINER_SAS_URL is not configured."
            exit 1
          fi

          npm run snapshots:refresh

      - name: Verify production snapshot freshness
        env:
          # Verify the API origin directly. The public hostname is protected by
          # Cloudflare and can reject GitHub-hosted runner traffic with HTTP 403
          # even when the App Service and Blob snapshot are healthy.
          API_ORIGIN: ${{ vars.API_ORIGIN || 'https://paddletodayapi-h7efgxcfg9h7gne9.centralus-01.azurewebsites.net' }}
          CAPTURED_GENERATED_AT: ${{ steps.capture.outputs.generated_at }}
          CAPTURED_ROUTE_COUNT: ${{ steps.capture.outputs.route_count }}
        run: |
          node --input-type=module <<'NODE'
          const apiOrigin = process.env.API_ORIGIN.replace(/\/$/, '');
          const capturedGeneratedAt = process.env.CAPTURED_GENERATED_AT || '';
          const capturedRouteCount = Number(process.env.CAPTURED_ROUTE_COUNT);
          if (!Number.isFinite(Date.parse(capturedGeneratedAt)) || !Number.isInteger(capturedRouteCount)) {
            throw new Error('Snapshot capture did not provide valid verification outputs.');
          }
          const headers = {
            accept: 'application/json',
            'user-agent': 'PaddleToday-GitHubActions/1.0 (+https://github.com/EckceptionalSolutions/PaddleTodayV2)',
          };
          const maxAttempts = 6;
          let lastError;

          for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
            try {
              const cacheBuster = Date.now();
              const [detailResponse, summaryResponse] = await Promise.all([
                fetch(`${apiOrigin}/api/rivers/rice-creek-peltier-to-long-lake.json?snapshot_check=${cacheBuster}`, {
                  headers,
                  signal: AbortSignal.timeout(30_000),
                }),
                fetch(`${apiOrigin}/api/rivers/summary.json?snapshot_check=${cacheBuster}`, {
                  headers,
                  signal: AbortSignal.timeout(30_000),
                }),
              ]);
              if (!detailResponse.ok || !summaryResponse.ok) {
                throw new Error(`Production verification returned detail HTTP ${detailResponse.status}, summary HTTP ${summaryResponse.status}.`);
              }

              const [detail, summary] = await Promise.all([detailResponse.json(), summaryResponse.json()]);
              console.log(`Production detail generatedAt=${detail.generatedAt || 'unknown'}; summary generatedAt=${summary.generatedAt || 'unknown'} routeCount=${summary.riverCount ?? 'unknown'}`);
              if (
                detail.generatedAt !== capturedGeneratedAt ||
                summary.generatedAt !== capturedGeneratedAt ||
                summary.riverCount !== capturedRouteCount
              ) {
                throw new Error('Production is not reading the exact snapshot written by this run. Check that the GitHub and App Service SAS URLs target the same container and prefix.');
              }

              process.exit(0);
            } catch (error) {
              lastError = error;
              if (attempt === maxAttempts) {
                break;
              }

              const message = error instanceof Error ? error.message : String(error);
              console.warn(`Snapshot probe attempt ${attempt}/${maxAttempts} failed: ${message}. Retrying...`);
              await new Promise((resolve) => setTimeout(resolve, 10_000));
            }
          }

          throw new Error(`Production snapshot verification failed after ${maxAttempts} attempts: ${lastError instanceof Error ? lastError.message : String(lastError)}`);
          NODE
