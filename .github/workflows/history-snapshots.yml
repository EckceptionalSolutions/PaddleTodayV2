name: Paddle Today History Snapshots

on:
  schedule:
    - cron: '12 * * * *'
  workflow_dispatch:

concurrency:
  group: history-snapshots
  cancel-in-progress: false

jobs:
  capture_history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Capture route history snapshots
        env:
          RIVER_HISTORY_CONTAINER_SAS_URL: ${{ secrets.RIVER_HISTORY_CONTAINER_SAS_URL }}
          RIVER_HISTORY_BLOB_PREFIX: ${{ vars.RIVER_HISTORY_BLOB_PREFIX || 'river-history' }}
          HISTORY_TIME_ZONE: ${{ vars.HISTORY_TIME_ZONE || 'America/Chicago' }}
        run: |
          if [ -z "$RIVER_HISTORY_CONTAINER_SAS_URL" ]; then
            echo "RIVER_HISTORY_CONTAINER_SAS_URL is not configured."
            exit 1
          fi

          npm run history:snapshot
