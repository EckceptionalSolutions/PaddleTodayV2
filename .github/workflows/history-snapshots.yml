name: Paddle Today History Snapshots

on:
  schedule:
    - cron: '12 * * * *'
  workflow_dispatch:

concurrency:
  group: history-snapshots
  cancel-in-progress: false

jobs:
  capture_history:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger route history snapshot
        env:
          HISTORY_SNAPSHOT_URL: ${{ secrets.HISTORY_SNAPSHOT_URL }}
          HISTORY_SNAPSHOT_TOKEN: ${{ secrets.HISTORY_SNAPSHOT_TOKEN }}
        run: |
          if [ -z "$HISTORY_SNAPSHOT_URL" ]; then
            echo "HISTORY_SNAPSHOT_URL is not configured."
            exit 1
          fi

          echo "Posting hourly route snapshot to $HISTORY_SNAPSHOT_URL"

          if [ -n "$HISTORY_SNAPSHOT_TOKEN" ]; then
            response=$(curl --silent --show-error --write-out "\n%{http_code}" \
              -X POST "$HISTORY_SNAPSHOT_URL" \
              -H "accept: application/json" \
              -H "x-history-token: $HISTORY_SNAPSHOT_TOKEN")
          else
            response=$(curl --silent --show-error --write-out "\n%{http_code}" \
              -X POST "$HISTORY_SNAPSHOT_URL" \
              -H "accept: application/json")
          fi

          body=$(printf '%s' "$response" | sed '$d')
          status=$(printf '%s' "$response" | tail -n 1)

          echo "$body"

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Snapshot capture failed with HTTP $status"
            exit 1
          fi
