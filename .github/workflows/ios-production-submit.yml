name: Paddle Today iOS Production Build And Submit

on:
  workflow_dispatch:

concurrency:
  group: ios-production-submit
  cancel-in-progress: false

jobs:
  build_and_submit_ios_production:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_BASE_URL: https://paddletoday.com
      EXPO_PUBLIC_APP_ENV: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release readiness
        run: npm run mobile:release-check

      - name: Typecheck mobile app
        run: npm run mobile:typecheck

      - name: Build iOS production and submit to App Store Connect
        working-directory: apps/mobile
        run: eas build --platform ios --profile production --auto-submit --non-interactive
